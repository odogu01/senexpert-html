<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | SenExpert Global Energies</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" href="image/title-logo.png" type="image/png">
  <link rel="apple-touch-icon" href="image/title-logo.png">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#0B3C6D',
            secondary: '#984307',
            'secondary-light': '#B86B2A',
            accent: '#00AEEF',
            background: '#F8FAFC',
          },
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
        }
      }
    }
  </script>
  <style>
    html { scroll-behavior: smooth; }
  </style>
</head>
<body class="font-sans antialiased bg-background min-h-screen flex items-center justify-center">
  
  <!-- Background -->
  <div class="absolute inset-0 bg-gradient-to-br from-primary via-secondary-light to-primary"></div>
  <div class="absolute inset-0 opacity-10" style="background-image: linear-gradient(to right, white 1px, transparent 1px), linear-gradient(to bottom, white 1px, transparent 1px); background-size: 60px 60px;"></div>

  <!-- Login Card -->
  <div class="relative z-10 w-full max-w-md mx-4">
    <div class="bg-white rounded-2xl shadow-2xl shadow-primary/20 overflow-hidden">
      <!-- Header -->
      <div class="bg-gradient-to-r from-primary to-secondary-light p-8 text-center">
        <img src="image/logo.png" alt="SenExpert Global" class="h-16 w-auto mx-auto mb-4">
        <h1 class="text-2xl font-bold text-white">Welcome Back</h1>
        <p class="text-white/80 text-sm mt-1">Sign in to your account</p>
      </div>
      
      <!-- Form -->
      <div class="p-8">
        <form class="space-y-6">
          <div>
            <label for="email" class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
            <div class="relative">
              <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
              <input type="email" id="email" name="email" placeholder="Enter your email" class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-lg focus:border-accent focus:ring-2 focus:ring-accent/20 outline-none transition-all">
            </div>
          </div>
          
          <div>
            <label for="password" class="block text-sm font-medium text-gray-700 mb-2">Password</label>
            <div class="relative">
              <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
              <input type="password" id="password" name="password" placeholder="Enter your password" class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-lg focus:border-accent focus:ring-2 focus:ring-accent/20 outline-none transition-all">
            </div>
          </div>
          
          <div class="flex items-center justify-between">
            <label class="flex items-center">
              <input type="checkbox" class="w-4 h-4 text-accent border-gray-300 rounded focus:ring-accent">
              <span class="ml-2 text-sm text-gray-600">Remember me</span>
            </label>
            <a href="#" class="text-sm text-accent hover:text-primary">Forgot password?</a>
          </div>
          
          <button type="submit" class="w-full py-3 bg-primary text-white font-semibold rounded-lg hover:bg-secondary transition-colors shadow-lg shadow-primary/25">
            Sign In
          </button>
        </form>
        
        <div class="mt-6 text-center">
          <p class="text-gray-600 text-sm">
            Don't have an account? 
            <a href="contact.html" class="text-accent hover:text-primary font-medium">Contact us</a>
          </p>
        </div>
      </div>
      
      <!-- Back to Home -->
      <div class="px-8 pb-8 text-center">
        <a href="index.html" class="inline-flex items-center gap-2 text-gray-500 hover:text-primary transition-colors text-sm">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
          Back to Home
        </a>
      </div>
    </div>
    
    <!-- Footer Note -->
    <p class="text-white/60 text-center text-sm mt-6">
      © 2026 SenExpert Global. All rights reserved.
    </p>
  </div>

</body>
</html>
